{% extends "base.html" %}
{% block body %}
  <div class="row" style="justify-content: space-between; align-items: baseline;">
    <div>
      <a href="/app">← Back</a>
      <h1 style="margin-top:10px">Sprint</h1>
    </div>
  </div>

  <div class="card">
    <div id="sprint_panel">
      {% if active %}
        {% with sprint=active, duration_minutes=active.duration_minutes %}
          {% include "partials/sprint_active.html" %}
        {% endwith %}
      {% else %}
        <h2>Start</h2>
        <form method="post" action="/app/sprint/start" hx-post="/app/sprint/start" hx-target="#sprint_panel" hx-swap="innerHTML">
          <div class="list">
            <select name="task_id">
              <option value="">(No task)</option>
              {% for task in tasks %}
                <option value="{{ task.id }}">{{ task.title }}</option>
              {% endfor %}
            </select>
            <input name="duration_minutes" type="number" min="5" max="90" value="25" />
            <button class="primary" type="submit">Start sprint</button>
          </div>
        </form>
      {% endif %}
    </div>
  </div>
{% endblock %}
